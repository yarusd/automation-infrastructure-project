name: Scheduled Tests
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # חובה להתקין את הדפדפנים בשרת של GitHub
          playwright install --with-deps

      - name: Run Pytest
        env:
          # זה הפתרון ל-ModuleNotFoundError - אומר לפייתון לחפש בתיקיית השורש
          PYTHONPATH: .
        run: pytest -s -v