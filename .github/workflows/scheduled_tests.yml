name: Scheduled Tests
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Pytest
        env:
          PYTHONPATH: .
          MY_API_KEY: ${{ secrets.MY_API_KEY }}
        # שים לב לתיקון בנתיב ובסינטקס כאן למטה
        run: xvfb-run pytest -s -v tests --ignore=tests/mobile --alluredir=./allure-results